# =============================================================================
# Core R-Theta 4-Axis Printer — Klipper Configuration
# =============================================================================
# Hardware:
#   - Raspberry Pi CM4 on BigTreeTech Manta M8P V2.0
#   - R axis (radial):   LC10E EtherCAT servo, slave 0
#   - Theta axis (rotation): LC10E EtherCAT servo, slave 1
#   - Z axis (vertical): LC10E EtherCAT servo, slave 2
#   - B axis (nozzle tilt): NEMA 17 + 50:1 harmonic drive (TMC2209)
#   - Extruder: CAN toolhead (EBB36/42)
#
# Network:
#   - CM4 Ethernet (RJ45) → EtherCAT daisy chain to servo drives
#   - CM4 WiFi → home network for web interface
#   - CAN bus → EBB36/42 toolhead
# =============================================================================

# === MCU ===
[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_XXXXXXXXXX-if00

# === Printer / Kinematics ===
# Uses matrix kinematic matching RRF's M669 K0.
# The axis_*_map values define the inverse matrix (axis → motor mapping).
# Each row is: drive0, drive1, drive2, drive3, drive4
#
# To match the original Core R-Theta RRF config exactly:
#   axis_c_map: 0, 0, 0, 0, 1
#   axis_x_map: -1, 0, 0, 1, 0
#   axis_z_map: 0, 0, 1, 0, 0
#   axis_b_map: 0.222222, 0, 0, 0.222222, 0
#
# For independent axes (each motor drives its own axis):
#   axis_x_map: 1, 0, 0, 0, 0
#   axis_c_map: 0, 1, 0, 0, 0
#   axis_z_map: 0, 0, 1, 0, 0
#   axis_b_map: 0, 0, 0, 1, 0

[printer]
kinematics: core_rtheta
max_velocity: 500
max_accel: 30000
max_z_velocity: 20
max_z_accel: 500
max_b_velocity: 100
max_b_accel: 2000
max_radius: 115.0

# Axis-to-motor mapping matrix (matches RRF M669 K0)
# Coefficients: drive0, drive1, drive2, drive3, drive4
axis_c_map: 0, 0, 0, 0, 1
axis_x_map: -1, 0, 0, 1, 0
axis_z_map: 0, 0, 1, 0, 0
axis_b_map: 0.222222, 0, 0, 0.222222, 0

# === EtherCAT Configuration ===
[ethercat]
cycle_time: 0.001

# === R Axis — Radial (EtherCAT Servo) ===
[ethercat_stepper stepper_r]
slave_position: 0
drive_type: lichuan_lc10e
encoder_resolution: 8388608
rotation_distance: 40        # mm per motor revolution (belt/pulley ratio)
max_velocity: 500
max_accel: 30000
max_following_error: 2.0
pid_kp: 50.0
pid_ki: 5.0
pid_kd: 0.5
ff_velocity: 1.0
autotune_travel: 30
position_min: 0
position_max: 115.0

# === Theta Axis — Rotation (EtherCAT Servo) ===
[ethercat_stepper stepper_theta]
slave_position: 1
drive_type: lichuan_lc10e
encoder_resolution: 8388608
rotation_distance: 360       # degrees per motor revolution
max_velocity: 21600          # deg/min → 360 deg/s
max_accel: 2000
max_following_error: 2.0
pid_kp: 50.0
pid_ki: 5.0
pid_kd: 0.5
ff_velocity: 1.0
autotune_travel: 90          # degrees safe travel for auto-tune
position_min: -999999
position_max: 999999         # Continuous rotation

# === Z Axis — Vertical (EtherCAT Servo) ===
[ethercat_stepper stepper_z]
slave_position: 2
drive_type: lichuan_lc10e
encoder_resolution: 8388608
rotation_distance: 8         # mm per rev (lead screw pitch)
max_velocity: 20
max_accel: 500
max_following_error: 1.0
pid_kp: 50.0
pid_ki: 5.0
pid_kd: 0.5
ff_velocity: 1.0
autotune_travel: 10
position_min: 0
position_max: 200

# === B Axis — Nozzle Tilt (NEMA 17 + Harmonic Drive) ===
[stepper_b]
step_pin: PE6                # Motor 5 on Manta M8P V2.0
dir_pin: PE5
enable_pin: !PC14
microsteps: 16
rotation_distance: 360       # degrees per motor revolution
gear_ratio: 50:1             # harmonic drive ratio
full_steps_per_rotation: 200
endstop_pin: tmc2209_stepper_b:virtual_endstop
position_min: -45
position_max: 45
homing_speed: 20
homing_retract_dist: 5

[tmc2209 stepper_b]
uart_pin: PC13
run_current: 0.8
hold_current: 0.4
stealthchop_threshold: 999999
diag_pin: ^PF0
driver_SGTHRS: 70            # Sensorless homing sensitivity

# === EtherCAT Support Modules ===
[ethercat_homing]

[ethercat_autotune]

# === CAN Toolhead ===
[mcu EBBCan]
canbus_uuid: XXXXXXXXXXXX

[extruder]
step_pin: EBBCan:PD0
dir_pin: EBBCan:PD1
enable_pin: !EBBCan:PD2
microsteps: 16
rotation_distance: 22.6789511
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: EBBCan:PB13
sensor_type: EPCOS 100K B57560G104F
sensor_pin: EBBCan:PA3
control: pid
pid_kp: 26.213
pid_ki: 1.304
pid_kd: 131.721
min_temp: 0
max_temp: 300
pressure_advance: 0.035

[fan]
pin: EBBCan:PA1

[heater_fan hotend_fan]
pin: EBBCan:PA0
heater: extruder
heater_temp: 50.0

# === Input Shaper ===
[input_shaper]
shaper_freq_x: 50.0
shaper_freq_y: 50.0
shaper_type: mzv

# === Macros ===

[gcode_macro INIT_PRINTER]
description: Initialize all axes — enable servos, home everything
gcode:
    SERVO_ENABLE AXIS=ALL
    G4 P1000
    SERVO_HOME AXIS=R          ; Absolute encoder — no motion
    SERVO_HOME AXIS=THETA
    SERVO_HOME AXIS=Z
    G28 B                       ; Home B axis (sensorless on TMC2209)

[gcode_macro TUNE_SERVOS]
description: Auto-tune all EtherCAT servo axes
gcode:
    SERVO_AUTOTUNE AXIS=R AGGRESSION=moderate
    SERVO_AUTOTUNE AXIS=THETA AGGRESSION=moderate
    SERVO_AUTOTUNE AXIS=Z AGGRESSION=moderate
    SAVE_CONFIG
