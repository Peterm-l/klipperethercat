# =============================================================================
# Example printer.cfg for Klipper EtherCAT Servo Integration
# =============================================================================
# Hardware:
#   - Raspberry Pi CM4 on BigTreeTech Manta M8P V2.0
#   - 3x Lichuan LC10E EtherCAT servo drives (X, Y, Z)
#   - CAN toolhead (EBB36/42) for extruder, hotend, fans
#   - NEMA 17 + harmonic drive on TMC2209 (rotary A axis)
#
# Network:
#   - CM4 Ethernet (RJ45) → EtherCAT daisy chain to servo drives
#   - CM4 WiFi → home network for web interface
#   - CAN bus → EBB36/42 toolhead
# =============================================================================

# === MCU Configuration ===
[mcu]
# Manta M8P V2.0 with CM4
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_XXXXXXXXXX-if00
# Or use USB:
# serial: /dev/ttyACM0

# === EtherCAT Configuration ===
[ethercat]
cycle_time: 0.001           # 1ms EtherCAT cycle (1kHz)
rt_process_path: /usr/local/bin/ethercat_rt
rt_config_path: /etc/klipper-ethercat/config.ini

# === EtherCAT Servo Axes ===

[ethercat_stepper stepper_x]
slave_position: 0            # First drive on EtherCAT bus
drive_type: lichuan_lc10e
encoder_resolution: 8388608  # 23-bit absolute = 2^23
rotation_distance: 40        # mm per motor revolution (adjust for your machine)
max_velocity: 500            # mm/s
max_accel: 30000             # mm/s^2
max_following_error: 2.0     # mm — fault if exceeded
# PID gains (0 = use auto-tune defaults, then run SERVO_AUTOTUNE)
pid_kp: 50.0
pid_ki: 5.0
pid_kd: 0.5
ff_velocity: 1.0            # Velocity feedforward gain
autotune_travel: 30          # mm of safe travel for auto-tune in each direction

[ethercat_stepper stepper_y]
slave_position: 1            # Second drive on EtherCAT bus
drive_type: lichuan_lc10e
encoder_resolution: 8388608
rotation_distance: 40
max_velocity: 500
max_accel: 30000
max_following_error: 2.0
pid_kp: 50.0
pid_ki: 5.0
pid_kd: 0.5
ff_velocity: 1.0
autotune_travel: 30

[ethercat_stepper stepper_z]
slave_position: 2            # Third drive on EtherCAT bus
drive_type: lichuan_lc10e
encoder_resolution: 8388608
rotation_distance: 8         # mm per rev (lead screw pitch)
max_velocity: 20             # Z is typically slower
max_accel: 500
max_following_error: 1.0
pid_kp: 50.0
pid_ki: 5.0
pid_kd: 0.5
ff_velocity: 1.0
autotune_travel: 10

# === EtherCAT Homing ===
[ethercat_homing]
# Homing module for absolute encoder support

# === EtherCAT Auto-Tune ===
[ethercat_autotune]
# Auto-tune module for PID tuning

# === Standard Klipper Stepper: Rotary Axis (A) ===
# Uses onboard TMC2209 driver on Manta M8P V2.0
# NEMA 17 with 50:1 harmonic drive

[stepper_a]
step_pin: PE6                # Motor 5 on Manta M8P V2.0
dir_pin: PE5
enable_pin: !PC14
microsteps: 16
rotation_distance: 360       # degrees per motor revolution
gear_ratio: 50:1             # harmonic drive ratio
full_steps_per_rotation: 200
endstop_pin: tmc2209_stepper_a:virtual_endstop
position_min: -360
position_max: 360
homing_speed: 20
homing_retract_dist: 5

[tmc2209 stepper_a]
uart_pin: PC13
run_current: 0.8
hold_current: 0.4
stealthchop_threshold: 999999
diag_pin: ^PF0
driver_SGTHRS: 70            # Sensorless homing sensitivity

# === CAN Toolhead ===
[mcu EBBCan]
canbus_uuid: XXXXXXXXXXXX    # Replace with your EBB36/42 UUID
# Find UUID with: ~/klippy-env/bin/python ~/klipper/scripts/canbus_query.py can0

# Extruder stepper
[extruder]
step_pin: EBBCan:PD0
dir_pin: EBBCan:PD1
enable_pin: !EBBCan:PD2
microsteps: 16
rotation_distance: 22.6789511  # Adjust for your extruder
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: EBBCan:PB13
sensor_type: EPCOS 100K B57560G104F
sensor_pin: EBBCan:PA3
control: pid
pid_kp: 26.213
pid_ki: 1.304
pid_kd: 131.721
min_temp: 0
max_temp: 300
pressure_advance: 0.035
pressure_advance_smooth_time: 0.040

# Part cooling fan
[fan]
pin: EBBCan:PA1

# Hotend cooling fan
[heater_fan hotend_fan]
pin: EBBCan:PA0
heater: extruder
heater_temp: 50.0

# === Printer Configuration ===
[printer]
kinematics: cartesian        # Or corexy, delta, etc.
max_velocity: 500
max_accel: 30000
max_z_velocity: 20
max_z_accel: 500

# === Heated Bed ===
[heater_bed]
heater_pin: PA1              # Manta M8P bed heater output
sensor_type: Generic 3950
sensor_pin: PB1
control: pid
pid_kp: 54.027
pid_ki: 0.770
pid_kd: 948.182
min_temp: 0
max_temp: 130

# === Input Shaper ===
# EtherCAT servos work with Klipper's input shaper
[input_shaper]
shaper_freq_x: 50.0          # Run resonance test to find values
shaper_freq_y: 50.0
shaper_type: mzv

# === Bed Mesh ===
# Works normally with EtherCAT axes
[bed_mesh]
speed: 300
horizontal_move_z: 5
mesh_min: 30, 30
mesh_max: 270, 270
probe_count: 5, 5

# === Macros ===

[gcode_macro SERVO_INIT]
description: Initialize and enable all EtherCAT servo axes
gcode:
    SERVO_ENABLE AXIS=ALL
    G4 P1000                  ; Wait 1 second for drives to enable
    SERVO_HOME AXIS=X
    SERVO_HOME AXIS=Y
    SERVO_HOME AXIS=Z

[gcode_macro SERVO_TUNE_ALL]
description: Auto-tune all EtherCAT servo axes
gcode:
    SERVO_AUTOTUNE AXIS=X AGGRESSION=moderate
    SERVO_AUTOTUNE AXIS=Y AGGRESSION=moderate
    SERVO_AUTOTUNE AXIS=Z AGGRESSION=moderate
    SAVE_CONFIG

[gcode_macro ESTOP]
description: Emergency stop all servo axes
gcode:
    M112                      ; Klipper emergency stop
